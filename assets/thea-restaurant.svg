<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Thea restaurant website full-card preview</title>
  <desc id="desc">A premium restaurant website preview card for Thea with hero, menu, reservation, and atmosphere sections filling the full card.</desc>
  <defs>
    <radialGradient id="warmGlow" cx="78%" cy="18%" r="74%">
      <stop offset="0" stop-color="#f5c28a" stop-opacity="0.36"/>
      <stop offset="0.42" stop-color="#7f4b39" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#090709" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wineGlow" cx="12%" cy="92%" r="70%">
      <stop offset="0" stop-color="#7a2743" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#090709" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#140b10"/>
      <stop offset="0.48" stop-color="#08070a"/>
      <stop offset="1" stop-color="#170b12"/>
    </linearGradient>
    <linearGradient id="creamPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ef"/>
      <stop offset="0.55" stop-color="#f7ead9"/>
      <stop offset="1" stop-color="#ead1b8"/>
    </linearGradient>
    <linearGradient id="photoA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d89354"/>
      <stop offset="0.42" stop-color="#5d211f"/>
      <stop offset="1" stop-color="#13090a"/>
    </linearGradient>
    <linearGradient id="photoB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1c27b"/>
      <stop offset="0.38" stop-color="#8d352a"/>
      <stop offset="1" stop-color="#220d12"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="creamShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: Manrope, Inter, "Segoe UI", Arial, sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .cream { fill: #fff2df; }
      .muted { fill: #d9bfa8; }
      .dark { fill: #21120f; }
      .wine { fill: #6f1f36; }
      .line { stroke: rgba(255,242,223,0.14); stroke-width: 1.2; }
      .label { fill: #e7b58d; font-size: 13px; font-weight: 950; letter-spacing: 3.4px; paint-order: stroke; stroke: rgba(9,7,9,0.78); stroke-width: 0.7px; }
      .shadowText { paint-order: stroke; stroke: rgba(9,7,9,0.7); stroke-width: 1.1px; }
      .creamText { paint-order: stroke; stroke: rgba(9,7,9,0.62); stroke-width: 1.35px; }
    </style>
  </defs>

  <rect width="1200" height="1000" fill="url(#page)"/>
  <rect width="1200" height="1000" fill="url(#warmGlow)"/>
  <rect width="1200" height="1000" fill="url(#wineGlow)"/>
  <g opacity="0.18" stroke="#fff2df">
    <path d="M0 150H1200M0 310H1200M0 470H1200M0 630H1200M0 790H1200"/>
    <path d="M140 0V1000M310 0V1000M480 0V1000M650 0V1000M820 0V1000M990 0V1000"/>
  </g>

  <g class="font">
    <g transform="translate(238 58)">
      <text x="0" y="0" class="label">RESTAURANT WEBSITE</text>
      <text x="0" y="78" class="serif cream creamText" font-size="96" font-weight="700" letter-spacing="-5">Thea</text>
      <text x="4" y="120" class="muted shadowText" font-size="22" font-weight="650">Atmosphere-led dining website concept</text>
    </g>

    <g transform="translate(178 224)" filter="url(#softShadow)">
      <rect width="662" height="438" rx="34" fill="url(#photoA)" stroke="rgba(255,242,223,0.2)"/>
      <circle cx="164" cy="118" r="92" fill="#f6c681" opacity="0.46"/>
      <circle cx="286" cy="286" r="152" fill="#2c0f10" opacity="0.54"/>
      <circle cx="480" cy="132" r="132" fill="#c87442" opacity="0.26"/>
      <path d="M0 314C150 260 286 350 432 303C526 273 584 213 662 226V438H0Z" fill="#0b0708" opacity="0.56"/>
      <text x="52" y="72" fill="#fff7eb" font-size="13" font-weight="900" letter-spacing="4">FEATURED EXPERIENCE</text>
      <text x="52" y="348" class="serif cream creamText" font-size="58" font-weight="700" letter-spacing="-2.4">Italian evening table</text>
      <text x="54" y="386" fill="#ffe3c4" class="shadowText" font-size="20" font-weight="650">Hero media, dining mood, and booking path in one view.</text>
    </g>

    <g transform="translate(790 172)" filter="url(#creamShadow)">
      <rect width="352" height="252" rx="28" fill="url(#creamPanel)"/>
      <text x="34" y="52" fill="#7b243a" font-size="13" font-weight="950" letter-spacing="3.2">MENU THEATRE</text>
      <text x="34" y="100" class="serif dark" font-size="42" font-weight="700" letter-spacing="-1.6">Signature dishes</text>
      <g transform="translate(34 132)" font-size="16" font-weight="750">
        <text x="0" y="0" fill="#3a2520">Truffle rigatoni</text>
        <text x="244" y="0" text-anchor="end" fill="#8b2b42">AED 86</text>
        <path d="M0 24H244" stroke="#dfc5ab"/>
        <text x="0" y="58" fill="#3a2520">Burrata garden</text>
        <text x="244" y="58" text-anchor="end" fill="#8b2b42">AED 72</text>
        <path d="M0 82H244" stroke="#dfc5ab"/>
        <text x="0" y="116" fill="#3a2520">Tiramisu table</text>
        <text x="244" y="116" text-anchor="end" fill="#8b2b42">AED 44</text>
      </g>
    </g>

    <g transform="translate(790 462)" filter="url(#softShadow)">
      <rect width="352" height="206" rx="28" fill="rgba(255,242,223,0.08)" stroke="rgba(255,242,223,0.14)"/>
      <text x="34" y="50" class="muted shadowText" font-size="13" font-weight="950" letter-spacing="3.2">RESERVATION FLOW</text>
      <text x="34" y="92" class="cream creamText" font-size="30" font-weight="900" letter-spacing="-1.2">Reserve tonight</text>
      <g transform="translate(34 122)">
        <rect width="86" height="42" rx="21" fill="#fff2df"/>
        <text x="43" y="27" text-anchor="middle" fill="#28120f" font-size="14" font-weight="900">2 guests</text>
        <rect x="98" width="86" height="42" rx="21" fill="rgba(255,242,223,0.12)" stroke="rgba(255,242,223,0.18)"/>
        <text x="141" y="27" text-anchor="middle" fill="#f4dcc4" font-size="14" font-weight="850">8:30 PM</text>
        <rect x="196" width="112" height="42" rx="21" fill="#7b61ff"/>
        <text x="252" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="900">Book table</text>
      </g>
    </g>

    <path d="M72 720H1128" class="line"/>
    <g transform="translate(222 774)">
      <text x="16" y="0" fill="#f0ba8c" class="shadowText" font-size="14" font-weight="950" letter-spacing="4">WEBSITE SYSTEM</text>
      <text x="16" y="82" class="serif cream creamText" font-size="82" font-weight="700" letter-spacing="-4">Thea Website</text>
    </g>
  </g>
</svg>
